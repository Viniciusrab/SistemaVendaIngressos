services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=vinidevuser
      - POSTGRES_PASSWORD=vinidevpass
      - POSTGRES_DB=vinidevdb
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - vinidev-network

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://vinidevuser:vinidevpass@db:5432/vinidevdb?schema=public
      - PORT=3000
    depends_on:
      - db
    command: npm start
    networks:
      - vinidev-network

  frontend:
    build:
      context: ./landinpage
    restart: always
    networks:
      - vinidev-network

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - vinidev-network

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - vinidev-network

networks:
  vinidev-network:
    driver: bridge
